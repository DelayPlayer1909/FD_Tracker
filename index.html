<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FD Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
.topnav{background:linear-gradient(135deg,#185fa5,#378add)!important;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.brand-icon{background:rgba(255,255,255,.25)!important}
.fd-card,.mcard,.chart-card,.filter-card{box-shadow:0 6px 18px rgba(0,0,0,.06)}
.chip.active,.atab.active{box-shadow:0 4px 12px rgba(24,95,165,.2)}
.fab{background:linear-gradient(135deg,#185fa5,#4aa3ff)!important}
@keyframes ringBell{0%,100%{transform:rotate(0)}20%{transform:rotate(-15deg)}40%{transform:rotate(12deg)}60%{transform:rotate(-8deg)}80%{transform:rotate(5deg)}}
.notif-warn i{display:inline-block;animation:ringBell 1.8s ease-in-out infinite;transform-origin:top center}
</style>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#eef2f7;
  --surface:#fff;
  --surface2:#f4f6fa;
  --border:rgba(0,0,0,0.09);
  --text:#111827;
  --muted:#6b7280;
  --blue:#185fa5;
  --blue-dk:#0c447c;
  --blue-light:#e6f1fb;
  --blue-mid:#378add;
  --teal-light:#e1f5ee;
  --orange:#ef9f27;
  --orange-light:#faeeda;
  --red:#a32d2d;
  --red-light:#fcebeb;
  --green:#3b6d11;
  --green-light:#eaf3de;
  --green-border:#97c459;
  --r:14px;--r-sm:10px;
  --nav-h:60px;--tab-h:68px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;background:var(--bg);color:var(--text)}

/* ── TOP NAV ── */
.topnav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);
  background:var(--blue);
  display:flex;align-items:center;padding:0 16px;z-index:100;
  gap:10px;
}
.topnav-brand{display:flex;align-items:center;gap:9px;color:#fff;font-size:18px;font-weight:700;flex:1}
.topnav-brand .brand-icon{
  width:34px;height:34px;background:rgba(255,255,255,0.2);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0
}
.topnav-icon{
  width:38px;height:38px;border-radius:10px;border:none;
  background:rgba(255,255,255,0.15);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:19px;cursor:pointer;transition:background .15s;flex-shrink:0
}
.topnav-icon:active{background:rgba(255,255,255,0.3)}
.topnav-icon .badge-dot{
  position:absolute;top:6px;right:6px;width:7px;height:7px;
  background:#ef9f27;border-radius:50%;border:1.5px solid var(--blue)
}
.topnav-icon{position:relative}

/* ── BOTTOM TABS ── */
.bottomtabs{
  position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.btab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;border:none;background:none;cursor:pointer;
  color:var(--muted);font-size:11px;font-weight:600;transition:color .15s;
  padding:10px 0 6px;letter-spacing:.2px
}
.btab i{font-size:24px;transition:transform .15s}
.btab.active{color:var(--blue)}
.btab.active i{transform:scale(1.08)}
.btab-indicator{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:32px;height:3px;background:var(--blue);border-radius:0 0 3px 3px;
  opacity:0;transition:opacity .2s
}
.btab.active .btab-indicator{opacity:1}
.btab{position:relative}

/* ── SCROLL PAGE ── */
.page{
  position:fixed;
  top:var(--nav-h);left:0;right:0;
  bottom:var(--tab-h);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px 14px 80px;display:none
}
.page.active{display:block}

/* ── FAB ── */
.fab{
  position:fixed;
  bottom:calc(var(--tab-h) + 16px);right:16px;
  width:56px;height:56px;border-radius:16px;
  background:var(--blue);color:#fff;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;cursor:pointer;z-index:90;
  box-shadow:0 6px 20px rgba(24,95,165,.45);
  transition:transform .15s,box-shadow .15s
}
.fab:active{transform:scale(.93);box-shadow:0 2px 8px rgba(24,95,165,.3)}

/* ── NOTIFICATION ── */
.notif{
  border-radius:var(--r-sm);padding:11px 14px;margin-bottom:11px;
  display:flex;align-items:flex-start;gap:10px;font-size:13px;line-height:1.45;
  border-left:4px solid
}
.notif i{font-size:17px;margin-top:1px;flex-shrink:0}
.notif-warn{background:var(--orange-light);border-color:var(--orange);color:#854f0b}
.notif-ok{background:var(--green-light);border-color:var(--green-border);color:var(--green)}

/* ── FILTER AREA ── */
.filter-card{
  background:var(--surface);border-radius:var(--r);
  border:1px solid var(--border);padding:12px 13px;
  margin-bottom:14px;
}
.filter-card-hdr{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.filter-card-hdr i{font-size:13px}
.chip-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.chip-scroll::-webkit-scrollbar{display:none}
.chip{
  padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;
  border:1.5px solid var(--border);background:var(--surface2);
  cursor:pointer;color:var(--muted);white-space:nowrap;transition:all .15s;flex-shrink:0;
  display:flex;align-items:center;gap:5px
}
.chip i{font-size:13px}
.chip.active{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue-dk);font-weight:600}
.chip:active{opacity:.7}
.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.filter-lbl{font-size:12px;color:var(--muted);font-weight:600;min-width:38px;letter-spacing:.2px}

/* ── SORT ROW ── */
.sort-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.sort-icon{color:var(--muted);font-size:16px}
.sort-sel{
  flex:1;padding:9px 11px;border-radius:var(--r-sm);
  border:1.5px solid var(--border);font-size:13px;font-family:inherit;
  background:var(--surface);color:var(--text);font-weight:500;
  -webkit-appearance:none;appearance:none
}

/* ── SECTION HEADER ── */
.sec-hdr{font-size:12px;font-weight:700;color:var(--muted);margin:4px 0 10px;display:flex;align-items:center;gap:7px;letter-spacing:.4px}
.sec-hdr i{font-size:15px}
.sec-hdr .cnt{font-weight:500;color:var(--muted)}
.tbl-section{margin-bottom:18px}

/* ── FD CARD GRID ── */
.fd-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── FD CARD ── */
.fd-card{
  border-radius:var(--r);padding:14px 13px 13px;cursor:pointer;
  position:relative;overflow:hidden;
  transition:transform .15s,box-shadow .15s;
}
.fd-card:active{transform:scale(.96)}
.fd-card.blue{background:var(--blue-light);border:1.5px solid #85b7eb}
.fd-card.orange{background:var(--orange-light);border:1.5px solid #f0c060}
.fd-card.green{background:var(--green-light);border:1.5px solid var(--green-border)}
/* colored top stripe */
.fd-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.fd-card.blue::before{background:var(--blue)}
.fd-card.orange::before{background:var(--orange)}
.fd-card.green::before{background:var(--green-border)}
.fd-card .card-badge{
  position:absolute;top:11px;right:10px;
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.2px
}
.fd-card.blue .card-badge{background:var(--blue);color:#fff}
.fd-card.orange .card-badge{background:var(--orange);color:#fff}
.fd-card.green .card-badge{background:var(--green);color:#fff}
.fd-card .card-date{font-size:10px;font-weight:600;opacity:.6;margin-bottom:5px;margin-top:2px}
.fd-card .card-amount{font-size:16px;font-weight:800;margin-bottom:6px;line-height:1.15;padding-right:38px}
.fd-card.blue .card-amount{color:var(--blue-dk)}
.fd-card.orange .card-amount{color:#854f0b}
.fd-card.green .card-amount{color:var(--green)}
.fd-card .card-bank{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:4px;margin-bottom:3px}
.fd-card .card-bank i{font-size:12px;flex-shrink:0}
.fd-card .card-user{font-size:11px;opacity:.65;display:flex;align-items:center;gap:4px;overflow:hidden}
.fd-card .card-user i{font-size:11px;flex-shrink:0}
.fd-card .card-user span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── METRIC CARDS ── */
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.mcard{
  background:var(--surface);border-radius:var(--r);
  border:1px solid var(--border);padding:14px 13px;
  display:flex;flex-direction:column;gap:4px
}
.mcard .m-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;margin-bottom:4px
}
.mcard .lbl{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.2px}
.mcard .val{font-size:19px;font-weight:800;line-height:1.1}
.mcard .sub{font-size:10px;color:var(--muted);margin-top:1px}

/* ── ANALYZE TABS ── */
.analyze-tabs{
  display:flex;gap:7px;margin-bottom:16px;
  overflow-x:auto;scrollbar-width:none;padding:2px 0
}
.analyze-tabs::-webkit-scrollbar{display:none}
.atab{
  padding:9px 16px;border-radius:20px;font-size:13px;font-weight:600;
  border:1.5px solid var(--border);background:var(--surface);
  cursor:pointer;color:var(--muted);white-space:nowrap;transition:all .15s;flex-shrink:0;
  display:flex;align-items:center;gap:6px
}
.atab i{font-size:15px}
.atab.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── CHART CARD ── */
.chart-card{
  background:var(--surface);border-radius:var(--r);
  border:1px solid var(--border);padding:16px 14px;margin-bottom:12px
}
.chart-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:7px}
.chart-title i{font-size:16px;color:var(--blue)}

/* ── BANK FILTER CHIPS (in analyze) ── */
.analyze-filter{margin-bottom:14px}
.analyze-filter-lbl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.4px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.analyze-filter-lbl i{font-size:13px}

/* ── PIE LEGEND ── */
.pie-legend-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 0;border-bottom:1px solid var(--border)
}
.pie-legend-item:last-child{border-bottom:none}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pie-name{font-size:13px;flex:1;font-weight:500}
.pie-amt{font-size:13px;font-weight:700}
.pie-pct{font-size:11px;color:var(--muted);min-width:34px;text-align:right}

/* ── USER CARD ── */
.user-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0}
.user-hdr{display:flex;align-items:center;gap:12px;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:14px}
.user-hdr-info{flex:1;min-width:0}
.user-hdr-info .name{font-size:15px;font-weight:700}
.user-hdr-info .meta{font-size:11px;color:var(--muted);margin-top:2px}

/* ── EXPORT ROW ── */
.export-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;padding-bottom:8px}

/* ── MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:200;
  align-items:flex-end;justify-content:center
}
.modal-bg.open{display:flex}
.modal{
  background:var(--surface);border-radius:22px 22px 0 0;
  padding:0 18px 24px;width:100%;max-height:93vh;overflow-y:auto;
  padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));
  animation:slideUp .22s cubic-bezier(.22,1,.36,1)
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-grip{width:40px;height:5px;background:rgba(0,0,0,.12);border-radius:3px;margin:14px auto 18px}
.modal-hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-right:36px}
.modal-hdr-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.modal-hdr h3{font-size:17px;font-weight:700;margin:0}
.modal-close{
  position:absolute;top:18px;right:16px;width:32px;height:32px;
  border-radius:50%;background:var(--surface2);border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--muted);cursor:pointer;line-height:1
}
.modal-close:active{background:var(--border)}
.modal{position:relative}

/* ── FORM ROWS ── */
.fr{margin-bottom:14px}
.fr label{
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:700;letter-spacing:.3px
}
.fr label i{font-size:14px}
.fr input,.fr select{
  width:100%;padding:11px 13px;border-radius:var(--r-sm);
  border:1.5px solid var(--border);font-size:15px;font-family:inherit;
  background:var(--surface2);color:var(--text);
  -webkit-appearance:none;appearance:none;transition:border .15s
}
.fr input:focus,.fr select:focus{
  outline:none;border-color:var(--blue-mid);background:var(--surface)
}
.tog-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;font-size:14px;font-weight:500;
  border-top:1px solid var(--border);margin-top:4px
}
.tog-row .tog-lbl{display:flex;align-items:center;gap:8px;color:var(--text)}
.tog-row .tog-lbl i{font-size:18px;color:var(--blue)}
.toggle{position:relative;width:48px;height:27px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tslider{position:absolute;inset:0;background:#d1d5db;border-radius:14px;cursor:pointer;transition:.22s}
.tslider:before{content:'';position:absolute;width:21px;height:21px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.22s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
input:checked+.tslider{background:var(--blue)}
input:checked+.tslider:before{transform:translateX(21px)}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 18px;border-radius:var(--r-sm);
  font-size:14px;font-weight:700;cursor:pointer;
  border:1.5px solid var(--border);background:var(--surface);
  color:var(--text);transition:all .15s;white-space:nowrap;font-family:inherit
}
.btn i{font-size:16px}
.btn:active{opacity:.8;transform:scale(.97)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-sm{padding:8px 13px;font-size:13px;gap:5px;border-radius:8px}
.btn-sm i{font-size:14px}
.btn-red{color:var(--red);border-color:#f5a0a0;background:var(--red-light)}
.btn-teal{color:#0f6e56;border-color:#5dcaa5;background:var(--teal-light)}
.btn-blue{color:var(--blue-dk);border-color:#85b7eb;background:var(--blue-light)}
.btn-gray{color:#374151;border-color:#d1d5db;background:var(--surface2)}
.btn-full{width:100%;margin-top:12px}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-actions .btn{flex:1}

/* ── DETAIL MODAL ── */
.detail-stripe{height:5px;margin:0 -18px 16px;border-radius:22px 22px 0 0;margin-top:-1px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-lbl{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
.detail-lbl i{font-size:14px}
.detail-val{font-size:14px;font-weight:700;text-align:right;max-width:58%}
.detail-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge i{font-size:12px}
.b-active{background:var(--blue-light);color:var(--blue-dk)}
.b-soon{background:var(--orange-light);color:#854f0b}
.b-matured{background:var(--green-light);color:var(--green)}

/* ── BANK / USER LIST ── */
.list-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 0;border-bottom:1px solid var(--border)
}
.list-item:last-child{border-bottom:none}
.list-item-icon{
  width:36px;height:36px;border-radius:10px;
  background:var(--blue-light);color:var(--blue);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0
}
.list-item-name{font-size:14px;font-weight:600;flex:1}

/* ── HISTORY ── */
.hist-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);align-items:center}
.hist-item:last-child{border-bottom:none}
.hist-dot{width:8px;height:8px;background:var(--blue);border-radius:50%;flex-shrink:0}
.hist-date{font-size:12px;color:var(--blue);font-weight:700;min-width:70px;flex-shrink:0}
.hist-amt{font-size:14px;font-weight:700;flex:1}
.hist-lbl{font-size:12px;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:20px}

/* ── RENEW INFO BOX ── */
.renew-info{
  background:var(--blue-light);border-radius:var(--r-sm);
  padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--blue-dk);line-height:1.6;
  border-left:3px solid var(--blue)
}
.renew-info strong{font-weight:700}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:32px 16px;color:var(--muted)}
.empty i{font-size:48px;opacity:.25;display:block;margin-bottom:10px}
.empty p{font-size:14px;font-weight:500}
.empty .empty-sub{font-size:12px;margin-top:4px;opacity:.7}

/* ── INPUT HEADER SEARCH ── */
.add-inp-wrap{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.add-inp-wrap input{
  flex:1;padding:11px 13px;border-radius:var(--r-sm);
  border:1.5px solid var(--border);font-size:14px;font-family:inherit;
  background:var(--surface2);color:var(--text);
  -webkit-appearance:none
}
.add-inp-wrap input:focus{outline:none;border-color:var(--blue-mid);background:var(--surface)}
</style>
</head>
<body>

<!-- TOP NAVIGATION -->
<header class="topnav">
  <div class="topnav-brand">
    <div class="brand-icon"><i class="bi bi-bank2"></i></div>
    FD Tracker
  </div>
  <div id="invest-hdr-btns" style="display:flex;gap:8px">
    <button class="topnav-icon" title="Manage Banks" onclick="openBankModal()" aria-label="Manage Banks">
      <i class="bi bi-bank2"></i>
    </button>
    <button class="topnav-icon" title="Manage Users" onclick="openUserModal()" aria-label="Manage Users">
      <i class="bi bi-people-fill"></i>
    </button>
    <button class="topnav-icon" title="Export CSV" onclick="exportCSV()" aria-label="Export CSV">
      <i class="bi bi-download"></i>
    </button>
  </div>
  <div id="analyze-hdr-btns" style="display:none;gap:8px">
    <button class="topnav-icon" title="Bank-wise PDF" onclick="exportPDF('bank')" aria-label="Bank PDF">
      <i class="bi bi-file-earmark-text-fill"></i>
    </button>
    <button class="topnav-icon" title="Export CSV" onclick="exportCSV()" aria-label="Export CSV">
      <i class="bi bi-download"></i>
    </button>
  </div>
</header>

<!-- INVEST PAGE -->
<div id="page-invest" class="page active">
  <div id="notif-area"></div>

  <!-- Sort + filter -->
  <div class="sort-row">
    <i class="bi bi-sort-down sort-icon"></i>
    <select class="sort-sel" id="sort-sel" onchange="renderAll()">
      <option value="">Default order</option>
      <option value="bank">Sort by Bank</option>

<script>
let banks=JSON.parse(localStorage.getItem('fd_banks3')||'["SBI","HDFC Bank","ICICI Bank","Axis Bank","PNB"]');
let users=JSON.parse(localStorage.getItem('fd_users3')||'["Sangita","Shivaji","Prathamesh","Chandrashekhar"]');
let fds=JSON.parse(localStorage.getItem('fd_r3')||'[]');
let editId=null,renewId=null,filterBank='all',filterUser='all';
let pieInst=null,barInst=null;
const PIE_COLORS=['#185fa5','#1d9e75','#ef9f27','#d85a30','#7f77dd','#d4537e','#639922','#0f6e56','#ba7517'];

function save(){localStorage.setItem('fd_r3',JSON.stringify(fds));localStorage.setItem('fd_banks3',JSON.stringify(banks));localStorage.setItem('fd_users3',JSON.stringify(users));}
function fmt(n){return '₹'+Math.round(n).toLocaleString('en-IN');}
function fmtDate(d){if(!d)return '';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'});}
function todayStr(){return new Date().toISOString().split('T')[0];}
function calcVal(fd,asOf){const s=new Date(fd.date),e=asOf?new Date(asOf):new Date();const m=Math.min((e-s)/(1000*60*60*24*30.44),fd.tenure);const r=fd.rate/100;return fd.compound?fd.amount*Math.pow(1+r/4,4*(m/12)):fd.amount*(1+r*m/12);}
function matDate(fd){const d=new Date(fd.date);d.setMonth(d.getMonth()+fd.tenure);return d;}
function matVal(fd){return calcVal(fd,matDate(fd));}
function daysLeft(fd){const m=matDate(fd),n=new Date();m.setHours(0,0,0,0);n.setHours(0,0,0,0);return Math.ceil((m-n)/(864e5));}
function getStatus(fd){if(fd.closed)return 'closed';const dl=daysLeft(fd);if(dl<=0)return 'matured';if(dl<=7)return 'soon';return 'active';}
function initials(name){return name?name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';}

function switchTab(s,el){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.btab').forEach(e=>e.classList.remove('active'));
  document.getElementById('page-'+s).classList.add('active');
  el.classList.add('active');
  document.getElementById('fab-add').style.display=s==='invest'?'flex':'none';
  document.getElementById('invest-hdr-btns').style.display=s==='invest'?'flex':'none';
  document.getElementById('analyze-hdr-btns').style.display=s==='analyze'?'flex':'none';
  if(s==='analyze')renderAnalyze();
}

function switchAnalyzeTab(name,el){
  document.querySelectorAll('.analyze-panel').forEach(p=>p.style.display='none');
  document.querySelectorAll('.atab').forEach(e=>e.classList.remove('active'));
  document.getElementById('analyze-'+name).style.display='block';
  el.classList.add('active');
  if(name==='timeline')renderTimeline();
  if(name==='user'){selectedAnalyzeUser=null;renderUserAnalysis();}
  if(name==='bank'){selectedAnalyzeBank=null;renderBankChart();}
}

function getFiltered(){return fds.filter(f=>!f.closed&&(filterBank==='all'||f.bank===filterBank)&&(filterUser==='all'||f.user===filterUser));}

function renderAll(){
  renderChips();
  const filtered=getFiltered();
  const active=filtered.filter(f=>getStatus(f)==='active');
  const soon=filtered.filter(f=>getStatus(f)==='soon');
  const matured=filtered.filter(f=>getStatus(f)==='matured');
  document.getElementById('section-active').style.display=active.length?'block':'none';
  document.getElementById('section-soon').style.display=soon.length?'block':'none';
  document.getElementById('section-matured').style.display=matured.length?'block':'none';
  renderTable(active);renderSoonTable(soon);renderMaturedTable(matured);renderNotifs();
  if(document.getElementById('page-analyze').classList.contains('active'))renderAnalyze();
}

function sortFDs(arr){
  const s=document.getElementById('sort-sel').value;const cp=[...arr];
  if(s==='bank')cp.sort((a,b)=>a.bank.localeCompare(b.bank));
  else if(s==='user')cp.sort((a,b)=>(a.user||'').localeCompare(b.user||''));
  else if(s==='amount-desc')cp.sort((a,b)=>b.amount-a.amount);
  else if(s==='amount-asc')cp.sort((a,b)=>a.amount-b.amount);
  else if(s==='maturity')cp.sort((a,b)=>matDate(a)-matDate(b));
  return cp;
}

function renderTable(active){
  const el=document.getElementById('fd-tbody');
  document.getElementById('fd-count').textContent='('+active.length+')';
  const sorted=sortFDs(active);
  if(!sorted.length){el.innerHTML=`<div style="grid-column:1/-1" class="empty"><i class="bi bi-inbox-fill"></i><p>No active FDs</p><p class="empty-sub">Tap + to add your first FD</p></div>`;return;}
  el.innerHTML=sorted.map(fd=>{
    const dl=daysLeft(fd);
    return `<div class="fd-card blue" onclick="openDetail('${fd.id}')">
      <div class="card-badge">${dl}d left</div>
      <div class="card-date">${fmtDate(new Date(fd.date))}</div>
      <div class="card-amount">${fmt(fd.amount)}</div>
      <div class="card-bank"><i class="bi bi-bank2"></i>${fd.bank}</div>
      <div class="card-user"><i class="bi bi-person-fill"></i><span>${fd.user||'-'}</span></div>
    </div>`;
  }).join('');
}

function renderSoonTable(soon){
  const el=document.getElementById('soon-tbody');
  if(!soon.length){el.innerHTML='';return;}
  el.innerHTML=soon.map(fd=>{
    const dl=daysLeft(fd);
    return `<div class="fd-card orange" onclick="openDetail('${fd.id}')">
      <div class="card-badge">${dl}d left</div>
      <div class="card-date">${fmtDate(matDate(fd))}</div>
      <div class="card-amount">${fmt(fd.amount)}</div>
      <div class="card-bank"><i class="bi bi-bank2"></i>${fd.bank}</div>
      <div class="card-user"><i class="bi bi-person-fill"></i><span>${fd.user||'-'}</span></div>
    </div>`;
  }).join('');
}

function renderMaturedTable(matured){
  const el=document.getElementById('matured-tbody');
  if(!matured.length){el.innerHTML='';return;}
  el.innerHTML=matured.map(fd=>{
    return `<div class="fd-card green" onclick="openDetail('${fd.id}')">
      <div class="card-badge">Matured</div>
      <div class="card-date">${fmtDate(matDate(fd))}</div>
      <div class="card-amount">${fmt(matVal(fd))}</div>
      <div class="card-bank"><i class="bi bi-bank2"></i>${fd.bank}</div>
      <div class="card-user"><i class="bi bi-person-fill"></i><span>${fd.user||'-'}</span></div>
    </div>`;
  }).join('');
}

function renderNotifs(){
  const all=fds.filter(f=>!f.closed);
  const matured=all.filter(f=>getStatus(f)==='matured');
  const soon=all.filter(f=>getStatus(f)==='soon');
  let html='';
  if(matured.length)html+=`<div class="notif notif-ok"><i class="bi bi-check-circle-fill"></i><span><strong>${matured.length}</strong> FD${matured.length>1?'s have':' has'} matured. Tap to renew.</span></div>`;
  if(soon.length)html+=`<div class="notif notif-warn"><i class="bi bi-bell-fill"></i><span><strong>${soon.length}</strong> FD${soon.length>1?'s are':' is'} maturing within 7 days.</span></div>`;
  document.getElementById('notif-area').innerHTML=html;
}

function renderChips(){
  const bc=document.getElementById('bank-chips');
  bc.innerHTML=`<button class="chip ${filterBank==='all'?'active':''}" onclick="setFilter('bank','all')"><i class="bi bi-list-ul"></i>All</button>`+
    banks.map(b=>`<button class="chip ${filterBank===b?'active':''}" onclick="setFilter('bank','${b}')"><i class="bi bi-bank2"></i>${b}</button>`).join('');
  const uc=document.getElementById('user-chips');
  uc.innerHTML=`<button class="chip ${filterUser==='all'?'active':''}" onclick="setFilter('user','all')"><i class="bi bi-list-ul"></i>All</button>`+
    users.map(u=>`<button class="chip ${filterUser===u?'active':''}" onclick="setFilter('user','${u}')"><i class="bi bi-person-fill"></i>${u}</button>`).join('');
}
function setFilter(type,val){if(type==='bank')filterBank=val;else filterUser=val;renderAll();}

function closeModal(id){document.getElementById(id).classList.remove('open');}

function openDetail(id){
  const fd=fds.find(f=>f.id===id);if(!fd)return;
  const st=getStatus(fd);const cv=calcVal(fd,new Date());const mv=matVal(fd);const md=matDate(fd);const dl=daysLeft(fd);
  const colors={active:{bar:'#185fa5',title:'#0c447c'},soon:{bar:'#ef9f27',title:'#854f0b'},matured:{bar:'#97c459',title:'#3b6d11'}};
  const c=colors[st]||colors.active;
  document.getElementById('detail-stripe').style.background=c.bar;
  document.getElementById('detail-title').style.color=c.title;
  document.getElementById('detail-title').textContent=fd.bank+' — '+fmt(fd.amount);
  const row=(icon,label,val)=>`<div class="detail-row">
    <span class="detail-lbl"><i class="bi bi-${icon}"></i>${label}</span>
    <span class="detail-val">${val}</span>
  </div>`;
  document.getElementById('detail-content').innerHTML=
    row('calendar2-fill','Start Date',fmtDate(new Date(fd.date)))+
    row('currency-rupee','Amount',fmt(fd.amount))+
    row('bank2','Bank',fd.bank)+
    row('person-fill','Account Holder',fd.user||'-')+
    row('percent','Interest Rate',fd.rate+'% p.a.')+
    row('clock-fill','Tenure',fd.tenure+' months')+
    row('arrow-repeat','Interest Type',fd.compound?'Compound (quarterly)':'Simple interest')+
    row('calendar-event-fill','Maturity Date',fmtDate(md))+
    row('graph-up-arrow','Current Value',`<span style="color:${c.title};font-size:15px">${fmt(cv)}</span>`)+
    row('flag-fill','Maturity Value',fmt(mv))+
    row('info-circle-fill','Status',st==='active'?`<span class="badge b-active"><i class="bi bi-circle-fill"></i>Active · ${dl}d left</span>`:st==='soon'?`<span class="badge b-soon"><i class="bi bi-bell-fill"></i>Maturing in ${dl}d</span>`:`<span class="badge b-matured"><i class="bi bi-check-circle-fill"></i>Matured</span>`);
  let acts=`<button class="btn btn-sm btn-blue" onclick="openHistory('${id}');closeModal('detail-modal')"><i class="bi bi-clock-history"></i> History</button>`;
  if(st==='matured')acts+=`<button class="btn btn-sm btn-teal" onclick="openRenew('${id}');closeModal('detail-modal')"><i class="bi bi-arrow-repeat"></i> Renew</button>`;
  acts+=`<button class="btn btn-sm btn-gray" onclick="closeModal('detail-modal');openAddModal(${JSON.stringify({id:fd.id,bank:fd.bank,user:fd.user,date:fd.date,amount:fd.amount,rate:fd.rate,tenure:fd.tenure,compound:fd.compound}).replace(/"/g,'&quot;')})"><i class="bi bi-pencil-square"></i> Edit</button>`;
  acts+=`<button class="btn btn-sm btn-red" onclick="if(confirm('Delete this FD?')){deleteFD('${id}');closeModal('detail-modal')}"><i class="bi bi-trash-fill"></i> Delete</button>`;
  document.getElementById('detail-actions').innerHTML=acts;
  document.getElementById('detail-modal').classList.add('open');
}

function openBankModal(){renderBankList();document.getElementById('bank-modal').classList.add('open');}
function addBank(){
  const inp=document.getElementById('new-bank-inp');const n=inp.value.trim();
  if(!n||banks.includes(n))return;banks.push(n);save();renderBankList();renderChips();inp.value='';
}
function removeBank(n){
  if(fds.some(f=>f.bank===n&&!f.closed)){alert('Cannot remove: bank has active FDs.');return;}
  banks=banks.filter(b=>b!==n);save();renderBankList();renderChips();
}
function renderBankList(){
  document.getElementById('bank-list').innerHTML=banks.map(b=>`
    <div class="list-item">
      <div class="list-item-icon"><i class="bi bi-bank2"></i></div>
      <span class="list-item-name">${b}</span>
      <button class="btn btn-sm btn-red" onclick="removeBank('${b}')"><i class="bi bi-trash-fill"></i></button>
    </div>`).join('');
}

function openUserModal(){renderUserList();document.getElementById('user-modal').classList.add('open');}
function addUser(){
  const inp=document.getElementById('new-user-inp');const n=inp.value.trim();
  if(!n||users.includes(n))return;users.push(n);save();renderUserList();renderChips();inp.value='';
}
function removeUser(n){
  if(fds.some(f=>f.user===n&&!f.closed)){alert('Cannot remove: user has active FDs.');return;}
  users=users.filter(u=>u!==n);save();renderUserList();renderChips();
}
function renderUserList(){
  document.getElementById('user-list').innerHTML=users.map(u=>`
    <div class="list-item">
      <div class="list-item-icon"><i class="bi bi-person-fill"></i></div>
      <span class="list-item-name">${u}</span>
      <button class="btn btn-sm btn-red" onclick="removeUser('${u}')"><i class="bi bi-trash-fill"></i></button>
    </div>`).join('');
}

function openAddModal(fd){
  editId=fd?fd.id:null;
  const icon=document.querySelector('#fd-modal .modal-hdr-icon');
  icon.innerHTML=editId?'<i class="bi bi-pencil-square"></i>':'<i class="bi bi-plus-lg"></i>';
  document.getElementById('modal-title').textContent=editId?'Edit FD':'Add New FD';
  document.getElementById('f-bank').innerHTML=banks.map(b=>`<option>${b}</option>`).join('');
  document.getElementById('f-user').innerHTML=users.map(u=>`<option>${u}</option>`).join('');
  if(fd){
    document.getElementById('f-bank').value=fd.bank;
    document.getElementById('f-user').value=fd.user||users[0];
    document.getElementById('f-date').value=fd.date;
    document.getElementById('f-amount').value=fd.amount;
    document.getElementById('f-rate').value=fd.rate;
    document.getElementById('f-tenure').value=fd.tenure;
    document.getElementById('f-compound').checked=fd.compound||false;
  } else {
    document.getElementById('f-date').value=todayStr();
    ['f-amount','f-rate'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-tenure').value=13;
    document.getElementById('f-compound').checked=false;
  }
  document.getElementById('fd-modal').classList.add('open');
}

function saveFD(){
  const bank=document.getElementById('f-bank').value;
  const user=document.getElementById('f-user').value;
  const date=document.getElementById('f-date').value;
  const amount=parseFloat(document.getElementById('f-amount').value);
  const rate=parseFloat(document.getElementById('f-rate').value);
  const tenure=parseInt(document.getElementById('f-tenure').value);
  const compound=document.getElementById('f-compound').checked;
  if(!bank||!user||!date||!amount||!rate||!tenure){alert('Please fill all fields.');return;}
  if(editId){const f=fds.find(x=>x.id===editId);if(f)Object.assign(f,{bank,user,date,amount,rate,tenure,compound});}
  else fds.push({id:Date.now().toString(),bank,user,date,amount,rate,tenure,compound,closed:false,history:[{date,amount,label:'Started'}]});
  save();closeModal('fd-modal');renderAll();
}

function deleteFD(id){if(!confirm('Delete this FD?'))return;fds=fds.filter(f=>f.id!==id);save();renderAll();}

function openHistory(id){
  const fd=fds.find(f=>f.id===id);if(!fd)return;
  document.getElementById('hist-content').innerHTML=fd.history.map(h=>`
    <div class="hist-item">
      <div class="hist-dot"></div>
      <span class="hist-date">${fmtDate(h.date)}</span>
      <span class="hist-amt">${fmt(h.amount)}</span>
      <span class="hist-lbl">${h.label}</span>
    </div>`).join('');
  document.getElementById('hist-modal').classList.add('open');
}

function openRenew(id){
  renewId=id;const fd=fds.find(f=>f.id===id);if(!fd)return;
  const mv=Math.round(matVal(fd));
  document.getElementById('renew-info').innerHTML=`<strong>${fd.bank}</strong>${fd.user?' &nbsp;·&nbsp; '+fd.user:''}<br>Principal: ${fmt(fd.amount)} &nbsp;·&nbsp; Maturity Value: <strong>${fmt(mv)}</strong>`;
  document.getElementById('r-date').value=todayStr();
  document.getElementById('r-amount').value=mv;
  document.getElementById('r-rate').value=fd.rate;
  document.getElementById('r-tenure').value=fd.tenure;
  document.getElementById('r-compound').checked=fd.compound||false;
  document.getElementById('renew-modal').classList.add('open');
}

function confirmRenew(){
  const fd=fds.find(f=>f.id===renewId);if(!fd)return;
  const date=document.getElementById('r-date').value;
  const amount=parseFloat(document.getElementById('r-amount').value);
  const rate=parseFloat(document.getElementById('r-rate').value);
  const tenure=parseInt(document.getElementById('r-tenure').value);
  const compound=document.getElementById('r-compound').checked;
  if(!date||!amount||!rate||!tenure){alert('Fill all fields.');return;}
  fd.closed=true;
  fds.push({id:Date.now().toString(),bank:fd.bank,user:fd.user,date,amount,rate,tenure,compound,closed:false,history:[...fd.history,{date,amount,label:'Renewed'}],renewedFrom:fd.id});
  save();closeModal('renew-modal');renderAll();
}

function updateMetricCards(fdList,label){
  const now=new Date();
  const ti=fdList.reduce((s,f)=>s+f.amount,0);
  const tc=fdList.reduce((s,f)=>s+calcVal(f,now),0);
  const allActive=fds.filter(f=>!f.closed);
  document.getElementById('metric-cards').innerHTML=`
    <div class="mcard">
      <div class="m-icon" style="background:var(--blue-light);color:var(--blue)"><i class="bi bi-currency-rupee"></i></div>
      <div class="lbl">TOTAL INVESTED</div>
      <div class="val">${fmt(ti)}</div>
      <div class="sub">${fdList.length} FD${fdList.length!==1?'s':''}${label?' · '+label:''}</div>
    </div>
    <div class="mcard">
      <div class="m-icon" style="background:var(--teal-light);color:#0f6e56"><i class="bi bi-graph-up-arrow"></i></div>
      <div class="lbl">CURRENT VALUE</div>
      <div class="val">${fmt(tc)}</div>
      <div class="sub">as of today</div>
    </div>
    <div class="mcard">
      <div class="m-icon" style="background:var(--green-light);color:var(--green)"><i class="bi bi-stars"></i></div>
      <div class="lbl">INTEREST EARNED</div>
      <div class="val" style="color:var(--green)">${fmt(tc-ti)}</div>
      <div class="sub">${ti>0?((tc-ti)/ti*100).toFixed(1)+'% return':''}</div>
    </div>
    <div class="mcard">
      <div class="m-icon" style="background:var(--orange-light);color:#854f0b"><i class="bi bi-bank2"></i></div>
      <div class="lbl">ACTIVE BANKS</div>
      <div class="val">${[...new Set(allActive.map(f=>f.bank))].length}</div>
      <div class="sub">${[...new Set(allActive.map(f=>f.user))].length} account holders</div>
    </div>`;
}

function renderAnalyze(){
  const active=fds.filter(f=>!f.closed);
  updateMetricCards(active,'');
  const panel=document.getElementById('analyze-bank');
  if(panel.style.display!=='none')renderBankChart();
}

let selectedAnalyzeBank=null;
function renderBankChart(){
  const active=fds.filter(f=>!f.closed);
  const allBanks=[...new Set(active.map(f=>f.bank))].sort();
  if(!selectedAnalyzeBank||!allBanks.includes(selectedAnalyzeBank))selectedAnalyzeBank=null;
  const chipsEl=document.getElementById('bank-select-chips');
  if(chipsEl)chipsEl.innerHTML=
    `<button class="chip ${!selectedAnalyzeBank?'active':''}" onclick="selectAnalyzeBank(null)"><i class="bi bi-list-ul"></i>All</button>`+
    allBanks.map(b=>`<button class="chip ${selectedAnalyzeBank===b?'active':''}" onclick="selectAnalyzeBank('${b}')"><i class="bi bi-bank2"></i>${b}</button>`).join('');
  const filtered=selectedAnalyzeBank?active.filter(f=>f.bank===selectedAnalyzeBank):active;
  const bm={};filtered.forEach(f=>{bm[f.bank]=(bm[f.bank]||0)+f.amount;});
  const bl=Object.keys(bm).sort((a,b)=>bm[b]-bm[a]);
  const total=Object.values(bm).reduce((s,v)=>s+v,0);
  const bc=bl.map((_,i)=>PIE_COLORS[i%PIE_COLORS.length]);
  const titleEl=document.getElementById('bank-chart-title');
  if(titleEl)titleEl.textContent=selectedAnalyzeBank?selectedAnalyzeBank+' – deposit breakdown':'All banks – deposit distribution';
  document.getElementById('pie-legend').innerHTML=bl.map((b,i)=>`
    <div class="pie-legend-item">
      <div class="pie-dot" style="background:${bc[i]}"></div>
      <div class="pie-name">${b}</div>
      <div class="pie-amt">${fmt(bm[b])}</div>
      <div class="pie-pct">${Math.round(bm[b]/total*100)}%</div>
    </div>`).join('');
  if(pieInst)pieInst.destroy();
  pieInst=new Chart(document.getElementById('pieChart'),{
    type:'pie',
    data:{labels:bl,datasets:[{data:bl.map(b=>bm[b]),backgroundColor:bc,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)} (${Math.round(c.raw/total*100)}%)`}}}}
  });
  updateMetricCards(filtered,selectedAnalyzeBank||'');
}
function selectAnalyzeBank(b){selectedAnalyzeBank=b;renderBankChart();}

let selectedAnalyzeUser=null;
function renderUserAnalysis(){
  const active=fds.filter(f=>!f.closed);
  const container=document.getElementById('user-analysis');
  const chipsEl=document.getElementById('user-select-chips');
  if(!active.length){
    chipsEl.innerHTML='';
    container.innerHTML=`<div class="empty"><i class="bi bi-inbox-fill"></i><p>No FD data yet.</p></div>`;
    return;
  }
  const allUsers=[...new Set(active.map(f=>f.user||'Unknown'))];
  if(!selectedAnalyzeUser||!allUsers.includes(selectedAnalyzeUser))selectedAnalyzeUser=allUsers[0];
  chipsEl.innerHTML=allUsers.map(u=>`<button class="chip ${selectedAnalyzeUser===u?'active':''}" onclick="selectAnalyzeUser('${u}')"><i class="bi bi-person-fill"></i>${u}</button>`).join('');
  const ui=allUsers.indexOf(selectedAnalyzeUser);
  const color=PIE_COLORS[ui%PIE_COLORS.length];
  const ufds=active.filter(f=>(f.user||'Unknown')===selectedAnalyzeUser);
  const ti=ufds.reduce((s,f)=>s+f.amount,0);
  const tc=ufds.reduce((s,f)=>s+calcVal(f,new Date()),0);
  updateMetricCards(ufds,selectedAnalyzeUser);
  const bankMap={};ufds.forEach(f=>{bankMap[f.bank]=(bankMap[f.bank]||0)+f.amount;});
  const bl=Object.keys(bankMap).sort((a,b)=>bankMap[b]-bankMap[a]);
  const bc=bl.map((_,i)=>PIE_COLORS[i%PIE_COLORS.length]);
  const total=bl.reduce((s,b)=>s+bankMap[b],0);
  const canvasId='user-pie-'+selectedAnalyzeUser.replace(/\s+/g,'_');
  container.innerHTML=`<div class="chart-card">
    <div class="user-hdr">
      <div class="user-avatar" style="background:${color}22;color:${color}">${initials(selectedAnalyzeUser)}</div>
      <div class="user-hdr-info">
        <div class="name">${selectedAnalyzeUser}</div>
        <div class="meta">${ufds.length} FD${ufds.length>1?'s':''} &nbsp;·&nbsp; Invested: ${fmt(ti)} &nbsp;·&nbsp; <span style="color:var(--green)">+${fmt(tc-ti)} earned</span></div>
      </div>
    </div>
    <div style="display:flex;justify-content:center;margin-bottom:16px">
      <div style="position:relative;width:190px;height:190px">
        <canvas id="${canvasId}" role="img" aria-label="Pie chart for ${selectedAnalyzeUser}"></canvas>
      </div>
    </div>
    ${bl.map((b,i)=>`
      <div class="pie-legend-item">
        <div class="pie-dot" style="background:${bc[i]}"></div>
        <div class="pie-name">${b}</div>
        <div class="pie-amt">${fmt(bankMap[b])}</div>
        <div class="pie-pct">${Math.round(bankMap[b]/total*100)}%</div>
      </div>`).join('')}
  </div>`;
  new Chart(document.getElementById(canvasId),{
    type:'pie',
    data:{labels:bl,datasets:[{data:bl.map(b=>bankMap[b]),backgroundColor:bc,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)} (${Math.round(c.raw/total*100)}%)`}}}}
  });
}
function selectAnalyzeUser(u){selectedAnalyzeUser=u;renderUserAnalysis();}

function renderTimeline(){
  const active=fds.filter(f=>!f.closed);
  const mm={};active.forEach(f=>{const m=f.date.slice(0,7);mm[m]=(mm[m]||0)+f.amount;});
  const mk=Object.keys(mm).sort();
  if(barInst)barInst.destroy();
  barInst=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels:mk.map(k=>new Date(k+'-01').toLocaleDateString('en-IN',{month:'short',year:'2-digit'})),
      datasets:[{label:'Invested',data:mk.map(k=>mm[k]),backgroundColor:'#185fa5',borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{ticks:{callback:v=>'₹'+Math.round(v).toLocaleString('en-IN')},grid:{color:'rgba(0,0,0,0.05)'}},x:{grid:{display:false}}}}
  });
}

function exportCSV(){
  const rows=[['ID','Bank','User','Date','Amount','Rate%','Tenure(months)','Type','Maturity Date','Current Value','Status']];
  fds.filter(f=>!f.closed).forEach(f=>{const md=matDate(f);rows.push([f.id,f.bank,f.user||'',f.date,f.amount,f.rate,f.tenure,f.compound?'Compound':'Simple',md.toISOString().split('T')[0],Math.round(calcVal(f,new Date())),getStatus(f)]);});
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));a.download='fd_tracker.csv';a.click();
}

function exportPDF(type){
  const win=window.open('','_blank');
  const active=fds.filter(f=>!f.closed);const now=new Date();
  const ti=active.reduce((s,f)=>s+f.amount,0);const tc=active.reduce((s,f)=>s+calcVal(f,now),0);
  let c=`<html><head><style>body{font-family:sans-serif;font-size:12px;color:#111}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:6px 8px;text-align:left}th{background:#e6f1fb;color:#0c447c}h1{color:#185fa5;font-size:18px}h2{color:#185fa5;font-size:14px;margin-top:20px}.sum{background:#f5f5f5;padding:10px;border-radius:6px;margin:10px 0;font-size:12px}</style></head><body>`;
  c+=`<h1>FD Tracker Report</h1><p>Generated: ${now.toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'})}</p>`;
  c+=`<div class="sum">Total Invested: ₹${Math.round(ti).toLocaleString('en-IN')} &nbsp;|&nbsp; Current Value: ₹${Math.round(tc).toLocaleString('en-IN')} &nbsp;|&nbsp; Interest Earned: ₹${Math.round(tc-ti).toLocaleString('en-IN')}</div>`;
  if(type==='bank'){
    const bm={};active.forEach(f=>{if(!bm[f.bank])bm[f.bank]=[];bm[f.bank].push(f);});
    Object.entries(bm).forEach(([bank,bfds])=>{
      c+=`<h2>${bank}</h2><table><tr><th>User</th><th>Date</th><th>Amount</th><th>Rate%</th><th>Tenure</th><th>Maturity</th><th>Mat. Value</th><th>Status</th></tr>`;
      bfds.forEach(f=>{const md=matDate(f);c+=`<tr><td>${f.user||'-'}</td><td>${f.date}</td><td>₹${f.amount.toLocaleString('en-IN')}</td><td>${f.rate}%</td><td>${f.tenure}m</td><td>${fmtDate(md)}</td><td>₹${Math.round(matVal(f)).toLocaleString('en-IN')}</td><td>${getStatus(f)}</td></tr>`;});
      c+=`</table>`;
    });
  } else {
    c+=`<h2>All FD Records</h2><table><tr><th>Bank</th><th>User</th><th>Date</th><th>Amount</th><th>Rate%</th><th>Tenure</th><th>Maturity</th><th>Curr. Value</th><th>Status</th></tr>`;
    active.forEach(f=>{const md=matDate(f);c+=`<tr><td>${f.bank}</td><td>${f.user||'-'}</td><td>${f.date}</td><td>₹${f.amount.toLocaleString('en-IN')}</td><td>${f.rate}%</td><td>${f.tenure}m</td><td>${fmtDate(md)}</td><td>₹${Math.round(calcVal(f,now)).toLocaleString('en-IN')}</td><td>${getStatus(f)}</td></tr>`;});
    c+=`</table>`;
  }
  c+=`</body></html>`;win.document.write(c);win.document.close();win.print();
}

// close modal on backdrop tap
document.querySelectorAll('.modal-bg').forEach(bg=>{
  bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('open');});
});

// Push notifications
if('Notification' in window&&Notification.permission==='default'){
  Notification.requestPermission().then(p=>{if(p==='granted'){
    const mat=fds.filter(f=>!f.closed&&getStatus(f)==='matured');
    const sn=fds.filter(f=>!f.closed&&getStatus(f)==='soon');
    if(mat.length)new Notification('FD Matured!',{body:`${mat.length} FD${mat.length>1?'s have':' has'} matured.`});
    else if(sn.length)new Notification('FD Maturing Soon',{body:`${sn.length} FD${sn.length>1?'s are':' is'} maturing within 7 days.`});
  }});
}

renderAll();
</script>
</body>
</html>
