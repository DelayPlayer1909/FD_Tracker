
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--color-background-tertiary,#f0f4f8);color:var(--color-text-primary,#1a1a1a)}
.nav{background:var(--color-background-primary,#fff);border-bottom:0.5px solid rgba(0,0,0,0.1);padding:0 1rem;display:flex;align-items:center}
.nav-brand{font-size:15px;font-weight:500;color:#0c447c;padding:14px 0;margin-right:auto;display:flex;align-items:center;gap:8px}
.nav-tab{padding:14px 16px;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--color-text-secondary,#666);border-bottom:2px solid transparent;transition:all 0.15s}
.nav-tab.active{color:#185fa5;border-bottom-color:#185fa5}
.screen{display:none;padding:1rem}
.screen.active{display:block}
.toolbar{display:flex;gap:7px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid rgba(0,0,0,0.18);background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a);transition:all 0.15s;white-space:nowrap}
.btn:hover{background:var(--color-background-secondary,#f5f5f5)}
.btn-primary{background:#185fa5;color:#fff;border-color:#185fa5}.btn-primary:hover{background:#0c447c}
.btn-sm{padding:4px 9px;font-size:11px;gap:4px}
.btn-red{color:#a32d2d;border-color:#f09595;background:#fcebeb}.btn-red:hover{background:#f7c1c1}
.btn-teal{color:#0f6e56;border-color:#5dcaa5;background:#e1f5ee}.btn-teal:hover{background:#9fe1cb}
.btn-blue{color:#0c447c;border-color:#85b7eb;background:#e6f1fb}.btn-blue:hover{background:#b5d4f4}
.btn-gray{color:#444441;border-color:#b4b2a9;background:#f1efe8}.btn-gray:hover{background:#d3d1c7}
.chip-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.chip-lbl{font-size:11px;color:var(--color-text-secondary,#888);font-weight:500;min-width:36px}
.chip{padding:4px 11px;border-radius:20px;font-size:12px;font-weight:500;border:0.5px solid rgba(0,0,0,0.15);background:var(--color-background-primary,#fff);cursor:pointer;color:var(--color-text-secondary,#666);transition:all 0.15s}
.chip.active{background:#e6f1fb;border-color:#378add;color:#0c447c}
.sec-hdr{font-size:12px;font-weight:500;color:var(--color-text-secondary,#666);margin-bottom:6px;display:flex;align-items:center;gap:6px;padding:0 2px}
.tbl-section{margin-bottom:1.25rem}
.tbl-wrap{background:var(--color-background-primary,#fff);border-radius:12px;border:0.5px solid rgba(0,0,0,0.1);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--color-background-secondary,#f8f8f8);padding:10px 12px;text-align:left;font-weight:500;font-size:11px;color:var(--color-text-secondary,#666);border-bottom:0.5px solid rgba(0,0,0,0.1);white-space:nowrap}
td{padding:11px 12px;border-bottom:0.5px solid rgba(0,0,0,0.06);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary,#f9f9f9)}
.row-active td:first-child{border-left:3px solid #378add;padding-left:9px}
.row-matured td:first-child{border-left:3px solid #97c459;padding-left:9px}
.row-soon td:first-child{border-left:3px solid #ef9f27;padding-left:9px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.b-active{background:#e6f1fb;color:#0c447c}
.b-soon{background:#faeeda;color:#854f0b}
.b-matured{background:#eaf3de;color:#3b6d11}
.inline-edit{border:none;background:transparent;font-size:13px;color:var(--color-text-primary,#1a1a1a);width:100%;font-family:inherit;padding:2px 0;cursor:pointer}
.inline-edit:focus{outline:1.5px solid #378add;border-radius:4px;background:#e6f1fb;padding:2px 5px}
.act-cell{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.notif{border-radius:8px;padding:9px 13px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:12px}
.notif-warn{background:#faeeda;border:0.5px solid #ef9f27;color:#854f0b}
.notif-ok{background:#eaf3de;border:0.5px solid #97c459;color:#3b6d11}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--color-background-primary,#fff);border-radius:12px;padding:1.25rem;width:min(420px,94vw);max-height:88vh;overflow-y:auto;border:0.5px solid rgba(0,0,0,0.1)}
.modal h3{font-size:15px;font-weight:500;margin-bottom:1rem}
.fr{margin-bottom:11px}
.fr label{display:block;font-size:11px;color:var(--color-text-secondary,#666);margin-bottom:3px;font-weight:500}
.fr input,.fr select{width:100%;padding:7px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);font-size:13px;font-family:inherit;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a)}
.fr input:focus,.fr select:focus{outline:2px solid #378add}
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;font-size:13px}
.toggle{position:relative;width:38px;height:21px}
.toggle input{opacity:0;width:0;height:0}
.tslider{position:absolute;inset:0;background:#b4b2a9;border-radius:11px;cursor:pointer;transition:.2s}
.tslider:before{content:'';position:absolute;width:15px;height:15px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
input:checked+.tslider{background:#185fa5}
input:checked+.tslider:before{transform:translateX(17px)}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.mcard{background:var(--color-background-secondary,#f5f5f5);border-radius:8px;padding:13px}
.mcard .lbl{font-size:11px;color:var(--color-text-secondary,#666);margin-bottom:3px}
.mcard .val{font-size:19px;font-weight:500}
.mcard .sub{font-size:11px;color:var(--color-text-secondary,#666);margin-top:2px}
.chart-card{background:var(--color-background-primary,#fff);border-radius:12px;border:0.5px solid rgba(0,0,0,0.1);padding:1rem;margin-bottom:1rem}
.chart-title{font-size:13px;font-weight:500;margin-bottom:12px}
.sort-sel{padding:6px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.18);font-size:12px;font-family:inherit;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a);cursor:pointer}
.bank-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid rgba(0,0,0,0.08);font-size:13px}
.analyze-tabs{display:flex;gap:6px;margin-bottom:1rem}
.atab{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;border:0.5px solid rgba(0,0,0,0.18);background:var(--color-background-primary,#fff);cursor:pointer;color:var(--color-text-secondary,#666);transition:all 0.15s}
.atab.active{background:#185fa5;color:#fff;border-color:#185fa5}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--color-text-primary,#1a1a1a);min-width:90px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;background:rgba(0,0,0,0.07);border-radius:4px;height:22px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:500;color:#fff;white-space:nowrap;transition:width 0.4s}
.bar-amt{font-size:12px;color:var(--color-text-primary,#1a1a1a);min-width:80px;text-align:right;font-weight:500}
.user-section{margin-bottom:1.5rem}
.user-hdr{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid rgba(0,0,0,0.1);margin-bottom:10px}
.fd-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:2px 0}
.fd-card{border-radius:12px;padding:12px 13px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;position:relative;overflow:hidden}
.fd-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,0.12)}
.fd-card:active{transform:translateY(0)}
.fd-card.blue{background:#e6f1fb;border:1.5px solid #378add}
.fd-card.orange{background:#faeeda;border:1.5px solid #ef9f27}
.fd-card.green{background:#eaf3de;border:1.5px solid #97c459}
.fd-card .card-date{font-size:10px;font-weight:500;opacity:0.7;margin-bottom:4px}
.fd-card .card-amount{font-size:16px;font-weight:600;margin-bottom:4px;line-height:1.2}
.fd-card .card-bank{font-size:11px;font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fd-card .card-user{font-size:11px;opacity:0.65;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fd-card .card-badge{position:absolute;top:10px;right:10px;font-size:9px;font-weight:600;padding:2px 6px;border-radius:10px}
.fd-card.blue .card-badge{background:#185fa5;color:#fff}
.fd-card.orange .card-badge{background:#ef9f27;color:#fff}
.fd-card.green .card-badge{background:#3b6d11;color:#fff}
.fd-card.blue .card-amount{color:#0c447c}
.fd-card.orange .card-amount{color:#854f0b}
.fd-card.green .card-amount{color:#3b6d11}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let banks=JSON.parse(localStorage.getItem('fd_banks3')||'["SBI","HDFC Bank","ICICI Bank","Axis Bank","PNB"]');
let users=JSON.parse(localStorage.getItem('fd_users3')||'["Sangita","Shivaji","Prathamesh","Chandrashekhar"]');
let fds=JSON.parse(localStorage.getItem('fd_r3')||'[]');
let editId=null,renewId=null,filterBank='all',filterUser='all';
let pieInst=null,barInst=null;
const PIE_COLORS=['#185fa5','#1d9e75','#ef9f27','#d85a30','#7f77dd','#d4537e','#639922','#0f6e56','#ba7517'];

function save(){localStorage.setItem('fd_r3',JSON.stringify(fds));localStorage.setItem('fd_banks3',JSON.stringify(banks));localStorage.setItem('fd_users3',JSON.stringify(users));}
function fmt(n){return '₹'+Math.round(n).toLocaleString('en-IN');}
function fmtDate(d){if(!d)return '';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'});}
function todayStr(){return new Date().toISOString().split('T')[0];}
function calcVal(fd,asOf){
  const s=new Date(fd.date),e=asOf?new Date(asOf):new Date();
  const m=Math.min((e-s)/(1000*60*60*24*30.44),fd.tenure);
  const r=fd.rate/100;
  return fd.compound?fd.amount*Math.pow(1+r/4,4*(m/12)):fd.amount*(1+r*m/12);
}
function matDate(fd){const d=new Date(fd.date);d.setMonth(d.getMonth()+fd.tenure);return d;}
function matVal(fd){return calcVal(fd,matDate(fd));}
function daysLeft(fd){const m=matDate(fd),n=new Date();m.setHours(0,0,0,0);n.setHours(0,0,0,0);return Math.ceil((m-n)/(864e5));}
function getStatus(fd){
  if(fd.closed)return 'closed';
  const dl=daysLeft(fd);
  if(dl<=0)return 'matured';
  if(dl<=7)return 'soon';
  return 'active';
}
function initials(name){return name?name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';}

function switchTab(s,el){
  document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  el.classList.add('active');
  if(s==='analyze')renderAnalyze();
}

function switchAnalyzeTab(name,el){
  document.querySelectorAll('.analyze-panel').forEach(p=>p.style.display='none');
  document.querySelectorAll('.atab').forEach(e=>e.classList.remove('active'));
  document.getElementById('analyze-'+name).style.display='block';
  el.classList.add('active');
  if(name==='timeline')renderTimeline();
  if(name==='user'){selectedAnalyzeUser=null;renderUserAnalysis();}
  if(name==='bank'){selectedAnalyzeBank=null;renderBankChart();}
}

function getFiltered(){
  return fds.filter(f=>!f.closed&&(filterBank==='all'||f.bank===filterBank)&&(filterUser==='all'||f.user===filterUser));
}

function renderAll(){
  renderChips();
  const filtered=getFiltered();
  const active=filtered.filter(f=>getStatus(f)==='active');
  const soon=filtered.filter(f=>getStatus(f)==='soon');
  const matured=filtered.filter(f=>getStatus(f)==='matured');
  document.getElementById('section-active').style.display=active.length?'block':'none';
  document.getElementById('section-soon').style.display=soon.length?'block':'none';
  document.getElementById('section-matured').style.display=matured.length?'block':'none';
  renderTable(active);
  renderSoonTable(soon);
  renderMaturedTable(matured);
  renderNotifs();
  if(document.getElementById('screen-analyze').classList.contains('active'))renderAnalyze();
}

function sortFDs(arr){
  const s=document.getElementById('sort-sel').value;
  const cp=[...arr];
  if(s==='bank')cp.sort((a,b)=>a.bank.localeCompare(b.bank));
  else if(s==='user')cp.sort((a,b)=>(a.user||'').localeCompare(b.user||''));
  else if(s==='amount-desc')cp.sort((a,b)=>b.amount-a.amount);
  else if(s==='amount-asc')cp.sort((a,b)=>a.amount-b.amount);
  else if(s==='maturity')cp.sort((a,b)=>matDate(a)-matDate(b));
  return cp;
}

function renderTable(active){
  const el=document.getElementById('fd-tbody');
  document.getElementById('fd-count').textContent=`(${active.length})`;
  const sorted=sortFDs(active);
  if(!sorted.length){el.innerHTML=`<div style="text-align:center;padding:1.5rem;color:#888;font-size:12px">No active FDs match the current filter.</div>`;return;}
  el.innerHTML=sorted.map(fd=>{
    const dl=daysLeft(fd);const md=matDate(fd);
    return `<div class="fd-card blue" onclick="openDetail('${fd.id}')">
      <div class="card-badge">${dl}d left</div>
      <div class="card-date">${fmtDate(new Date(fd.date))}</div>
      <div class="card-amount">${fmt(fd.amount)}</div>
      <div class="card-bank"><i class="ti ti-building-bank" style="font-size:10px"></i> ${fd.bank}</div>
      <div class="card-user"><i class="ti ti-user" style="font-size:10px"></i> ${fd.user||'-'}</div>
    </div>`;
  }).join('');
}

function renderSoonTable(soon){
  const el=document.getElementById('soon-tbody');
  if(!soon.length){el.innerHTML='';return;}
  el.innerHTML=soon.map(fd=>{
    const dl=daysLeft(fd);
    return `<div class="fd-card orange" onclick="openDetail('${fd.id}')">
      <div class="card-badge">${dl}d left</div>
      <div class="card-date">${fmtDate(matDate(fd))}</div>
      <div class="card-amount">${fmt(fd.amount)}</div>
      <div class="card-bank"><i class="ti ti-building-bank" style="font-size:10px"></i> ${fd.bank}</div>
      <div class="card-user"><i class="ti ti-user" style="font-size:10px"></i> ${fd.user||'-'}</div>
    </div>`;
  }).join('');
}

function renderMaturedTable(matured){
  const el=document.getElementById('matured-tbody');
  if(!matured.length){el.innerHTML='';return;}
  el.innerHTML=matured.map(fd=>{
    const md=matDate(fd);
    return `<div class="fd-card green" onclick="openDetail('${fd.id}')">
      <div class="card-badge">Matured</div>
      <div class="card-date">${fmtDate(md)}</div>
      <div class="card-amount">${fmt(matVal(fd))}</div>
      <div class="card-bank"><i class="ti ti-building-bank" style="font-size:10px"></i> ${fd.bank}</div>
      <div class="card-user"><i class="ti ti-user" style="font-size:10px"></i> ${fd.user||'-'}</div>
    </div>`;
  }).join('');
}

function renderNotifs(){
  const all=fds.filter(f=>!f.closed);
  const matured=all.filter(f=>getStatus(f)==='matured');
  const soon=all.filter(f=>getStatus(f)==='soon');
  let html='';
  if(matured.length)html+=`<div class="notif notif-ok"><i class="ti ti-check-circle" aria-hidden="true"></i> <strong>${matured.length}</strong> FD${matured.length>1?'s have':' has'} matured. See Matured FDs to renew.</div>`;
  if(soon.length)html+=`<div class="notif notif-warn"><i class="ti ti-bell" aria-hidden="true"></i> <strong>${soon.length}</strong> FD${soon.length>1?'s are':' is'} maturing within 7 days.</div>`;
  document.getElementById('notif-area').innerHTML=html;
}

function renderChips(){
  const bc=document.getElementById('bank-chips');
  bc.innerHTML=`<button class="chip ${filterBank==='all'?'active':''}" onclick="setFilter('bank','all')">All</button>`+
    banks.map(b=>`<button class="chip ${filterBank===b?'active':''}" onclick="setFilter('bank','${b}')">${b}</button>`).join('');
  const uc=document.getElementById('user-chips');
  uc.innerHTML=`<button class="chip ${filterUser==='all'?'active':''}" onclick="setFilter('user','all')">All</button>`+
    users.map(u=>`<button class="chip ${filterUser===u?'active':''}" onclick="setFilter('user','${u}')">${u}</button>`).join('');
}
function setFilter(type,val){if(type==='bank')filterBank=val;else filterUser=val;renderAll();}

function updateField(id,field,val){const fd=fds.find(f=>f.id===id);if(fd){fd[field]=isNaN(+val)||field==='bank'||field==='user'?val:+val;save();renderAll();}}

function openAddModal(fd){
  editId=fd?fd.id:null;
  document.getElementById('modal-title').textContent=editId?'Edit FD':'Add New FD';
  document.getElementById('f-bank').innerHTML=banks.map(b=>`<option>${b}</option>`).join('');
  document.getElementById('f-user').innerHTML=users.map(u=>`<option>${u}</option>`).join('');
  if(fd){
    document.getElementById('f-bank').value=fd.bank;
    document.getElementById('f-user').value=fd.user||users[0];
    document.getElementById('f-date').value=fd.date;
    document.getElementById('f-amount').value=fd.amount;
    document.getElementById('f-rate').value=fd.rate;
    document.getElementById('f-tenure').value=fd.tenure;
    document.getElementById('f-compound').checked=fd.compound||false;
  } else {
    document.getElementById('f-date').value=todayStr();
    ['f-amount','f-rate'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-tenure').value=13;
    document.getElementById('f-compound').checked=false;
  }
  document.getElementById('fd-modal').classList.add('open');
}
function saveFD(){
  const bank=document.getElementById('f-bank').value;
  const user=document.getElementById('f-user').value;
  const date=document.getElementById('f-date').value;
  const amount=parseFloat(document.getElementById('f-amount').value);
  const rate=parseFloat(document.getElementById('f-rate').value);
  const tenure=parseInt(document.getElementById('f-tenure').value);
  const compound=document.getElementById('f-compound').checked;
  if(!bank||!user||!date||!amount||!rate||!tenure){alert('Please fill all fields.');return;}
  if(editId){const f=fds.find(x=>x.id===editId);if(f){Object.assign(f,{bank,user,date,amount,rate,tenure,compound});}}
  else{fds.push({id:Date.now().toString(),bank,user,date,amount,rate,tenure,compound,closed:false,history:[{date,amount,label:'Started'}]});}
  save();closeModal('fd-modal');renderAll();
}
function deleteFD(id){if(!confirm('Delete this FD?'))return;fds=fds.filter(f=>f.id!==id);save();renderAll();}
function openHistory(id){
  const fd=fds.find(f=>f.id===id);if(!fd)return;
  document.getElementById('hist-content').innerHTML=fd.history.map(h=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,0.07);font-size:12px;align-items:baseline"><span style="color:#185fa5;font-weight:500;min-width:80px">${fmtDate(h.date)}</span><span style="font-weight:500">${fmt(h.amount)}</span><span style="color:var(--color-text-secondary,#666)">${h.label}</span></div>`).join('');
  document.getElementById('hist-modal').classList.add('open');
}
function openRenew(id){
  renewId=id;const fd=fds.find(f=>f.id===id);if(!fd)return;
  const mv=Math.round(matVal(fd));
  document.getElementById('renew-info').innerHTML=`<strong>${fd.bank}</strong>${fd.user?' · '+fd.user:''} &nbsp;|&nbsp; Principal: ${fmt(fd.amount)} &nbsp;|&nbsp; Maturity Value: <strong>${fmt(mv)}</strong>`;
  document.getElementById('r-date').value=todayStr();
  document.getElementById('r-amount').value=mv;
  document.getElementById('r-rate').value=fd.rate;
  document.getElementById('r-tenure').value=fd.tenure;
  document.getElementById('r-compound').checked=fd.compound||false;
  document.getElementById('renew-modal').classList.add('open');
}
function confirmRenew(){
  const fd=fds.find(f=>f.id===renewId);if(!fd)return;
  const date=document.getElementById('r-date').value;
  const amount=parseFloat(document.getElementById('r-amount').value);
  const rate=parseFloat(document.getElementById('r-rate').value);
  const tenure=parseInt(document.getElementById('r-tenure').value);
  const compound=document.getElementById('r-compound').checked;
  if(!date||!amount||!rate||!tenure){alert('Fill all fields.');return;}
  fd.closed=true;
  fds.push({id:Date.now().toString(),bank:fd.bank,user:fd.user,date,amount,rate,tenure,compound,closed:false,history:[...fd.history,{date,amount,label:'Renewed'}],renewedFrom:fd.id});
  save();closeModal('renew-modal');renderAll();
}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function openDetail(id){
  const fd=fds.find(f=>f.id===id);if(!fd)return;
  const st=getStatus(fd);
  const cv=calcVal(fd,new Date());
  const mv=matVal(fd);
  const md=matDate(fd);
  const dl=daysLeft(fd);
  const colors={active:{bar:'#185fa5',title:'#0c447c'},soon:{bar:'#ef9f27',title:'#854f0b'},matured:{bar:'#97c459',title:'#3b6d11'}};
  const c=colors[st]||colors.active;
  document.getElementById('detail-color-bar').style.background=c.bar;
  document.getElementById('detail-title').style.color=c.title;
  document.getElementById('detail-title').textContent=fd.bank+' — '+fmt(fd.amount);

  const row=(label,val)=>`<div style="display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:0.5px solid rgba(0,0,0,0.06)">
    <span style="font-size:11px;color:var(--color-text-secondary,#888);font-weight:500">${label}</span>
    <span style="font-size:13px;font-weight:500;text-align:right;max-width:60%">${val}</span>
  </div>`;

  document.getElementById('detail-content').innerHTML=
    row('Date', fmtDate(new Date(fd.date)))+
    row('Amount', fmt(fd.amount))+
    row('Bank', fd.bank)+
    row('User', fd.user||'-')+
    row('Rate', fd.rate+'% p.a.')+
    row('Tenure', fd.tenure+' months')+
    row('Type', fd.compound?'Compound (quarterly)':'Simple interest')+
    row('Maturity Date', fmtDate(md))+
    row('Current Value', `<span style="color:${c.title}">${fmt(cv)}</span>`)+
    row('Maturity Value', fmt(mv))+
    row('Status', st==='active'?`<span class="badge b-active">Active · ${dl}d left</span>`:st==='soon'?`<span class="badge b-soon">Maturing in ${dl}d</span>`:`<span class="badge b-matured">Matured</span>`);

  let acts=`<button class="btn btn-sm btn-blue" onclick="openHistory('${id}');closeModal('detail-modal')"><i class="ti ti-history"></i> History</button>`;
  if(st==='matured')acts+=`<button class="btn btn-sm btn-teal" onclick="openRenew('${id}');closeModal('detail-modal')"><i class="ti ti-refresh"></i> Renew</button>`;
  acts+=`<button class="btn btn-sm btn-gray" onclick="closeModal('detail-modal');openAddModal(${JSON.stringify({id:fd.id,bank:fd.bank,user:fd.user,date:fd.date,amount:fd.amount,rate:fd.rate,tenure:fd.tenure,compound:fd.compound}).replace(/"/g,'&quot;')})"><i class="ti ti-edit"></i> Edit</button>`;
  acts+=`<button class="btn btn-sm btn-red" onclick="if(confirm('Delete this FD?')){deleteFD('${id}');closeModal('detail-modal')}"><i class="ti ti-trash"></i> Delete</button>`;
  document.getElementById('detail-actions').innerHTML=acts;
  document.getElementById('detail-modal').classList.add('open');
}
function openBankModal(){renderBankList();document.getElementById('bank-modal').classList.add('open');}
function addBank(){const inp=document.getElementById('new-bank-inp');const n=inp.value.trim();if(!n||banks.includes(n))return;banks.push(n);save();renderBankList();renderChips();inp.value='';}
function removeBank(n){if(fds.some(f=>f.bank===n&&!f.closed)){alert('Cannot remove: bank has active FDs.');return;}banks=banks.filter(b=>b!==n);save();renderBankList();renderChips();}
function renderBankList(){document.getElementById('bank-list').innerHTML=banks.map(b=>`<div class="bank-item"><span>${b}</span><button class="btn btn-sm btn-red" onclick="removeBank('${b}')"><i class="ti ti-trash" aria-hidden="true"></i> Remove</button></div>`).join('');}
function openUserModal(){renderUserList();document.getElementById('user-modal').classList.add('open');}
function addUser(){const inp=document.getElementById('new-user-inp');const n=inp.value.trim();if(!n||users.includes(n))return;users.push(n);save();renderUserList();renderChips();inp.value='';}
function removeUser(n){if(fds.some(f=>f.user===n&&!f.closed)){alert('Cannot remove: user has active FDs.');return;}users=users.filter(u=>u!==n);save();renderUserList();renderChips();}
function renderUserList(){document.getElementById('user-list').innerHTML=users.map(u=>`<div class="bank-item"><span>${u}</span><button class="btn btn-sm btn-red" onclick="removeUser('${u}')"><i class="ti ti-trash" aria-hidden="true"></i> Remove</button></div>`).join('');}

function updateMetricCards(fdList, label){
  const now=new Date();
  const ti=fdList.reduce((s,f)=>s+f.amount,0);
  const tc=fdList.reduce((s,f)=>s+calcVal(f,now),0);
  const allActive=fds.filter(f=>!f.closed);
  document.getElementById('metric-cards').innerHTML=`
    <div class="mcard"><div class="lbl">Total Invested</div><div class="val">${fmt(ti)}</div><div class="sub">${fdList.length} FD${fdList.length!==1?'s':''} ${label?'· '+label:''}</div></div>
    <div class="mcard"><div class="lbl">Current Value</div><div class="val">${fmt(tc)}</div><div class="sub">as of today</div></div>
    <div class="mcard"><div class="lbl">Interest Earned</div><div class="val" style="color:#3b6d11">${fmt(tc-ti)}</div><div class="sub">${ti>0?((tc-ti)/ti*100).toFixed(1)+'% return':''}</div></div>
    <div class="mcard"><div class="lbl">Active Banks</div><div class="val">${[...new Set(allActive.map(f=>f.bank))].length}</div><div class="sub">${[...new Set(allActive.map(f=>f.user))].length} users</div></div>`;
}

function renderAnalyze(){
  const active=fds.filter(f=>!f.closed);
  updateMetricCards(active,'');
  const panel=document.getElementById('analyze-bank');
  if(panel.style.display!=='none')renderBankChart();
}

let selectedAnalyzeBank=null;
function renderBankChart(){
  const active=fds.filter(f=>!f.closed);
  const allBanks=[...new Set(active.map(f=>f.bank))].sort();
  if(!selectedAnalyzeBank||!allBanks.includes(selectedAnalyzeBank))selectedAnalyzeBank=null;

  const chipsEl=document.getElementById('bank-select-chips');
  if(chipsEl){
    chipsEl.innerHTML=`<button class="chip ${!selectedAnalyzeBank?'active':''}" onclick="selectAnalyzeBank(null)">All</button>`+
      allBanks.map(b=>`<button class="chip ${selectedAnalyzeBank===b?'active':''}" onclick="selectAnalyzeBank('${b}')">${b}</button>`).join('');
  }

  const filtered=selectedAnalyzeBank?active.filter(f=>f.bank===selectedAnalyzeBank):active;
  const bm={};filtered.forEach(f=>{bm[f.bank]=(bm[f.bank]||0)+f.amount;});
  const bl=Object.keys(bm).sort((a,b)=>bm[b]-bm[a]);
  const total=Object.values(bm).reduce((s,v)=>s+v,0);
  const bc=bl.map((_,i)=>PIE_COLORS[i%PIE_COLORS.length]);

  const titleEl=document.getElementById('bank-chart-title');
  if(titleEl)titleEl.textContent=selectedAnalyzeBank?`${selectedAnalyzeBank} – deposit breakdown`:'All banks – deposit distribution';

  document.getElementById('pie-legend').innerHTML=bl.map((b,i)=>`
    <div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,0.06)">
      <div style="width:9px;height:9px;border-radius:50%;background:${bc[i]};flex-shrink:0"></div>
      <div style="font-size:12px;color:var(--color-text-primary,#1a1a1a);flex-shrink:0">${b}</div>
      <div style="flex:1;border-bottom:1px dotted rgba(0,0,0,0.12);height:1px;margin:0 4px"></div>
      <div style="font-size:12px;font-weight:600;color:var(--color-text-primary,#1a1a1a);flex-shrink:0">${fmt(bm[b])}</div>
      <div style="font-size:11px;color:var(--color-text-secondary,#888);flex-shrink:0;min-width:30px;text-align:right">${Math.round(bm[b]/total*100)}%</div>
    </div>`).join('');

  if(pieInst)pieInst.destroy();
  pieInst=new Chart(document.getElementById('pieChart'),{
    type:'pie',
    data:{labels:bl,datasets:[{data:bl.map(b=>bm[b]),backgroundColor:bc,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)} (${Math.round(c.raw/total*100)}%)`}}}}
  });

  updateMetricCards(filtered, selectedAnalyzeBank||'');
}
function selectAnalyzeBank(b){selectedAnalyzeBank=b;renderBankChart();}

let selectedAnalyzeUser=null;
function renderUserAnalysis(){
  const active=fds.filter(f=>!f.closed);
  const container=document.getElementById('user-analysis');
  const chipsEl=document.getElementById('user-select-chips');
  if(!active.length){
    chipsEl.innerHTML='';
    container.innerHTML=`<div style="text-align:center;padding:2rem;color:#888;font-size:13px">No FD data yet.</div>`;
    return;
  }
  const allUsers=[...new Set(active.map(f=>f.user||'Unknown'))];
  if(!selectedAnalyzeUser||!allUsers.includes(selectedAnalyzeUser))selectedAnalyzeUser=allUsers[0];

  chipsEl.innerHTML=allUsers.map(u=>`<button class="chip ${selectedAnalyzeUser===u?'active':''}" onclick="selectAnalyzeUser('${u}')">${u}</button>`).join('');

  const ui=allUsers.indexOf(selectedAnalyzeUser);
  const color=PIE_COLORS[ui%PIE_COLORS.length];
  const ufds=active.filter(f=>(f.user||'Unknown')===selectedAnalyzeUser);
  const ti=ufds.reduce((s,f)=>s+f.amount,0);
  const tc=ufds.reduce((s,f)=>s+calcVal(f,new Date()),0);
  updateMetricCards(ufds, selectedAnalyzeUser);
  const bankMap={};ufds.forEach(f=>{bankMap[f.bank]=(bankMap[f.bank]||0)+f.amount;});
  const bl=Object.keys(bankMap).sort((a,b)=>bankMap[b]-bankMap[a]);
  const bc=bl.map((_,i)=>PIE_COLORS[i%PIE_COLORS.length]);
  const total=bl.reduce((s,b)=>s+bankMap[b],0);

  const canvasId='user-pie-'+selectedAnalyzeUser.replace(/\s+/g,'_');
  container.innerHTML=`<div class="chart-card user-section">
    <div class="user-hdr">
      <div class="user-avatar" style="background:${color}22;color:${color}">${initials(selectedAnalyzeUser)}</div>
      <div>
        <div style="font-size:14px;font-weight:500">${selectedAnalyzeUser}</div>
        <div style="font-size:11px;color:var(--color-text-secondary,#666)">${ufds.length} FD${ufds.length>1?'s':''} &nbsp;·&nbsp; Invested: ${fmt(ti)} &nbsp;·&nbsp; Current: ${fmt(tc)} &nbsp;·&nbsp; <span style="color:#3b6d11">+${fmt(tc-ti)}</span></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:1rem">
      <div style="position:relative;width:170px;height:170px">
        <canvas id="${canvasId}" role="img" aria-label="Pie chart for ${selectedAnalyzeUser}"></canvas>
      </div>
      <div style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:0">
        ${bl.map((b,i)=>`
        <div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,0.06)">
          <div style="width:9px;height:9px;border-radius:50%;background:${bc[i]};flex-shrink:0"></div>
          <div style="font-size:12px;color:var(--color-text-primary,#1a1a1a);flex-shrink:0">${b}</div>
          <div style="flex:1;border-bottom:1px dotted rgba(0,0,0,0.12);height:1px;margin:0 4px"></div>
          <div style="font-size:12px;font-weight:600;color:var(--color-text-primary,#1a1a1a);flex-shrink:0">${fmt(bankMap[b])}</div>
          <div style="font-size:11px;color:var(--color-text-secondary,#888);flex-shrink:0;min-width:30px;text-align:right">${Math.round(bankMap[b]/total*100)}%</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;

  new Chart(document.getElementById(canvasId),{
    type:'pie',
    data:{labels:bl,datasets:[{data:bl.map(b=>bankMap[b]),backgroundColor:bc,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)} (${Math.round(c.raw/total*100)}%)`}}}}
  });
}
function selectAnalyzeUser(u){selectedAnalyzeUser=u;renderUserAnalysis();}

function renderTimeline(){
  const active=fds.filter(f=>!f.closed);
  const mm={};active.forEach(f=>{const m=f.date.slice(0,7);mm[m]=(mm[m]||0)+f.amount;});
  const mk=Object.keys(mm).sort();
  if(barInst)barInst.destroy();
  barInst=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels:mk.map(k=>new Date(k+'-01').toLocaleDateString('en-IN',{month:'short',year:'2-digit'})),
      datasets:[{label:'Invested',data:mk.map(k=>mm[k]),backgroundColor:'#185fa5',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{ticks:{callback:v=>'₹'+Math.round(v).toLocaleString('en-IN')},grid:{color:'rgba(0,0,0,0.05)'}},x:{grid:{display:false}}}}
  });
}

function exportCSV(){
  const rows=[['ID','Bank','User','Date','Amount','Rate%','Tenure(months)','Type','Maturity Date','Current Value','Status']];
  fds.filter(f=>!f.closed).forEach(f=>{const md=matDate(f);rows.push([f.id,f.bank,f.user||'',f.date,f.amount,f.rate,f.tenure,f.compound?'Compound':'Simple',md.toISOString().split('T')[0],Math.round(calcVal(f,new Date())),getStatus(f)]);});
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));a.download='fd_tracker.csv';a.click();
}
function exportPDF(type){
  const win=window.open('','_blank');
  const active=fds.filter(f=>!f.closed);const now=new Date();
  const ti=active.reduce((s,f)=>s+f.amount,0);const tc=active.reduce((s,f)=>s+calcVal(f,now),0);
  let c=`<html><head><style>body{font-family:sans-serif;font-size:12px;color:#111}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:6px 8px;text-align:left}th{background:#e6f1fb;color:#0c447c}h1{color:#185fa5;font-size:18px}h2{color:#185fa5;font-size:14px;margin-top:20px}.sum{background:#f5f5f5;padding:10px;border-radius:6px;margin:10px 0;font-size:12px}</style></head><body>`;
  c+=`<h1>FD Tracker Report</h1><p>Generated: ${now.toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'})}</p>`;
  c+=`<div class="sum">Total Invested: ₹${Math.round(ti).toLocaleString('en-IN')} &nbsp;|&nbsp; Current Value: ₹${Math.round(tc).toLocaleString('en-IN')} &nbsp;|&nbsp; Interest Earned: ₹${Math.round(tc-ti).toLocaleString('en-IN')}</div>`;
  if(type==='bank'){
    const bm={};active.forEach(f=>{if(!bm[f.bank])bm[f.bank]=[];bm[f.bank].push(f);});
    Object.entries(bm).forEach(([bank,bfds])=>{
      c+=`<h2>${bank}</h2><table><tr><th>User</th><th>Date</th><th>Amount</th><th>Rate%</th><th>Tenure</th><th>Maturity</th><th>Mat. Value</th><th>Status</th></tr>`;
      bfds.forEach(f=>{const md=matDate(f);c+=`<tr><td>${f.user||'-'}</td><td>${f.date}</td><td>₹${f.amount.toLocaleString('en-IN')}</td><td>${f.rate}%</td><td>${f.tenure}m</td><td>${fmtDate(md)}</td><td>₹${Math.round(matVal(f)).toLocaleString('en-IN')}</td><td>${getStatus(f)}</td></tr>`;});
      c+=`</table>`;
    });
  } else {
    c+=`<h2>All FD Records</h2><table><tr><th>Bank</th><th>User</th><th>Date</th><th>Amount</th><th>Rate%</th><th>Tenure</th><th>Maturity</th><th>Curr. Value</th><th>Status</th></tr>`;
    active.forEach(f=>{const md=matDate(f);c+=`<tr><td>${f.bank}</td><td>${f.user||'-'}</td><td>${f.date}</td><td>₹${f.amount.toLocaleString('en-IN')}</td><td>${f.rate}%</td><td>${f.tenure}m</td><td>${fmtDate(md)}</td><td>₹${Math.round(calcVal(f,now)).toLocaleString('en-IN')}</td><td>${getStatus(f)}</td></tr>`;});
    c+=`</table>`;
  }
  c+=`</body></html>`;win.document.write(c);win.document.close();win.print();
}

if('Notification' in window&&Notification.permission==='default'){
  Notification.requestPermission().then(p=>{if(p==='granted'){
    const mat=fds.filter(f=>!f.closed&&getStatus(f)==='matured');
    const sn=fds.filter(f=>!f.closed&&getStatus(f)==='soon');
    if(mat.length)new Notification('FD Matured!',{body:`${mat.length} FD${mat.length>1?'s have':' has'} matured.`});
    else if(sn.length)new Notification('FD Maturing Soon',{body:`${sn.length} FD${sn.length>1?'s are':' is'} maturing within 7 days.`});
  }});
}
renderAll();
</script>
